name: Diagnose Plan browser regression

on:
  pull_request:
    paths:
      - '.github/workflows/diagnose-plan-e2e.yml'
      - 'deploy/plan_e2e.py'
      - 'plans/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-plan-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Playwright
        run: |
          set -euo pipefail
          python3 -m venv .plan-browser-venv
          .plan-browser-venv/bin/pip install -q --upgrade pip
          .plan-browser-venv/bin/pip install -q playwright
          .plan-browser-venv/bin/python -m playwright install --with-deps chromium

      - name: Patch diagnostic-only control operations
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('deploy/plan_e2e.py')
          content = path.read_text(encoding='utf-8')
          content = content.replace(
              'page.locator(".grade-filter").uncheck()',
              'page.locator(".grade-filter").evaluate_all("elements => elements.forEach(element => { element.checked = false; window.jQuery(element).trigger(\'change\'); })")',
          )
          content = content.replace(
              'page.locator(".grade-filter").check()',
              'page.locator(".grade-filter").evaluate_all("elements => elements.forEach(element => { element.checked = true; window.jQuery(element).trigger(\'change\'); })")',
          )
          content = content.replace(
              'page.select_option("#otherStudentSelect", label=STUDENT_LABEL)',
              '''page.evaluate("""
              label => {
                const select = document.querySelector('#otherStudentSelect');
                const option = Array.from(select.options).find(
                  item => item.textContent.trim() === label
                );
                if (!option) throw new Error('Other student option not found');
                window.jQuery(select).val(option.value).trigger('change');
              }
              """, STUDENT_LABEL)''',
          )
          path.write_text(content, encoding='utf-8')
          PY

      - name: Run Plan browser regression with full output
        id: browser-test
        shell: bash
        env:
          PLAN_BASE_URL: https://panel.kimiagarkhoone.com
          PLAN_USERNAME: ${{ secrets.DJANGO_ADMIN_USERNAME }}
          PLAN_PASSWORD: ${{ secrets.DJANGO_ADMIN_PASSWORD }}
          PLAN_STUDENT_LABEL: نمونه تجربی دوازدهم
          PLAN_TEST_WEEK: 1499-01-01
        run: |
          set +e
          export PLAN_USERNAME="${PLAN_USERNAME:-admin}"
          .plan-browser-venv/bin/python deploy/plan_e2e.py > plan-e2e-output.txt 2>&1
          status=$?
          cat plan-e2e-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Upload browser output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: plan-e2e-output
          path: plan-e2e-output.txt
          retention-days: 3
