name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: kimiagarkhune-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to panel.kimiagarkhoone.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate Plan source files
        shell: bash
        run: |
          set -euo pipefail
          node --check plans/static/plans/plan-runtime.js
          python3 -m py_compile \
            deploy/plan_e2e.py \
            plans/plan_page.py \
            plans/weekly_plans.py

      - name: Validate required secrets
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DJANGO_ADMIN_PASSWORD: ${{ secrets.DJANGO_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$SERVER_HOST" || { echo "Missing SERVER_HOST secret"; exit 1; }
          test -n "$SERVER_USER" || { echo "Missing SERVER_USER secret"; exit 1; }
          test -n "$SERVER_PASSWORD" || { echo "Missing SERVER_PASSWORD secret"; exit 1; }
          test -n "$SERVER_PORT" || { echo "Missing SERVER_PORT secret"; exit 1; }
          test -n "$DJANGO_ADMIN_PASSWORD" || { echo "Missing DJANGO_ADMIN_PASSWORD secret"; exit 1; }

      - name: Bootstrap and deploy server
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_SSL_EMAIL: ${{ secrets.SSL_EMAIL }}
          DEPLOY_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DEPLOY_TELEGRAM_WORKER_URL: ${{ secrets.TELEGRAM_WORKER_URL }}
          DEPLOY_KAVENEGAR_API_KEY: ${{ secrets.KAVENEGAR_API_KEY }}
          DEPLOY_KAVENEGAR_SENDER: ${{ secrets.KAVENEGAR_SENDER }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 60s
          command_timeout: 30m
          envs: DEPLOY_SSL_EMAIL,DEPLOY_TELEGRAM_BOT_TOKEN,DEPLOY_TELEGRAM_WORKER_URL,DEPLOY_KAVENEGAR_API_KEY,DEPLOY_KAVENEGAR_SENDER
          script_path: deploy/deploy.sh

      - name: Create or update initial admin and plan defaults
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_ADMIN_USERNAME: ${{ secrets.DJANGO_ADMIN_USERNAME }}
          DEPLOY_ADMIN_EMAIL: ${{ secrets.DJANGO_ADMIN_EMAIL }}
          DEPLOY_ADMIN_PASSWORD: ${{ secrets.DJANGO_ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 60s
          command_timeout: 5m
          envs: DEPLOY_ADMIN_USERNAME,DEPLOY_ADMIN_EMAIL,DEPLOY_ADMIN_PASSWORD
          script: |
            set -eu

            if [ -z "${DEPLOY_ADMIN_PASSWORD:-}" ]; then
              echo 'DJANGO_ADMIN_PASSWORD is not configured; skipping initial admin creation.'
              exit 0
            fi

            set -a
            . /etc/kimiagarkhune.env
            set +a
            cd /var/www/KimiagarKhune

            ./venv/bin/python manage.py shell <<'PY'
            import os
            from django.contrib.auth import get_user_model
            from plans.default_plan_data import ensure_advisor_for_user, seed_plan_defaults

            username = (os.environ.get('DEPLOY_ADMIN_USERNAME') or 'admin').strip()
            email = (os.environ.get('DEPLOY_ADMIN_EMAIL') or '').strip()
            password = os.environ['DEPLOY_ADMIN_PASSWORD']

            User = get_user_model()
            user, created = User.objects.get_or_create(
                username=username,
                defaults={'email': email},
            )
            if email:
                user.email = email
            user.is_active = True
            user.is_staff = True
            user.is_superuser = True
            user.set_password(password)
            user.save()

            advisor = ensure_advisor_for_user(user)
            summary = seed_plan_defaults(advisor=advisor)

            action = 'Created' if created else 'Updated'
            print(f'{action} Django admin: {username}')
            print(
                'Plan defaults assigned: '
                f'{summary.students_created} students created, '
                f'{summary.students_updated} students updated, '
                f'{summary.events_created} events created.'
            )
            PY

      - name: Repair upstream, open ports and verify services
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_SSH_PORT: ${{ secrets.SERVER_PORT }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 60s
          command_timeout: 10m
          envs: DEPLOY_SSH_PORT
          script: |
            set -eu

            diagnostics() {
              echo '===== systemd service ====='
              systemctl --no-pager --full status kimiagarkhune || true
              echo '===== gunicorn journal ====='
              journalctl -u kimiagarkhune -n 150 --no-pager || true
              echo '===== nginx status ====='
              systemctl --no-pager --full status nginx || true
              echo '===== nginx error log ====='
              tail -n 100 /var/log/nginx/error.log || true
              echo '===== listening ports ====='
              ss -lntp || true
            }
            trap diagnostics EXIT

            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y ufw curl

            ufw allow "${DEPLOY_SSH_PORT:-22}/tcp"
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw --force enable

            # Use a loopback TCP upstream instead of a Unix socket. This avoids
            # socket ownership/path issues that surface as an Nginx 502.
            sed -i \
              's#--bind unix:/run/kimiagarkhune/gunicorn.sock#--bind 127.0.0.1:8000#g' \
              /etc/systemd/system/kimiagarkhune.service

            sed -i \
              's#proxy_pass http://unix:/run/kimiagarkhune/gunicorn.sock;#proxy_pass http://127.0.0.1:8000;#g' \
              /etc/nginx/sites-available/kimiagarkhune

            systemctl daemon-reload
            nginx -t
            systemctl restart kimiagarkhune

            ready=0
            for attempt in $(seq 1 30); do
              if curl --fail --silent --show-error --max-time 5 \
                -H 'Host: panel.kimiagarkhoone.com' \
                http://127.0.0.1:8000/ >/dev/null; then
                ready=1
                break
              fi
              sleep 2
            done

            if [ "$ready" -ne 1 ]; then
              echo 'Gunicorn did not become healthy on 127.0.0.1:8000.'
              exit 1
            fi

            systemctl restart nginx
            systemctl is-active --quiet nginx
            systemctl is-active --quiet kimiagarkhune

            curl --fail --silent --show-error --max-time 20 \
              -H 'Host: panel.kimiagarkhoone.com' \
              http://127.0.0.1/ >/dev/null

            trap - EXIT
            echo 'Local Django, Gunicorn and Nginx checks passed.'

      - name: Verify public IP endpoint
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --head \
            --retry 5 --retry-delay 5 --retry-all-errors \
            --connect-timeout 10 --max-time 30 \
            -H 'Host: panel.kimiagarkhoone.com' \
            "http://${SERVER_HOST}/"

      - name: Verify DNS and public domain
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DOMAIN: panel.kimiagarkhoone.com
        run: |
          set -euo pipefail

          RESOLVED_IP=''
          for attempt in $(seq 1 20); do
            RESOLVED_IP="$(getent ahostsv4 "$DOMAIN" | awk 'NR == 1 {print $1}' || true)"
            if [ "$RESOLVED_IP" = "$SERVER_HOST" ]; then
              break
            fi
            echo "DNS attempt ${attempt}: ${DOMAIN} resolved to '${RESOLVED_IP:-nothing}', waiting..."
            sleep 30
          done

          test -n "$RESOLVED_IP" || {
            echo "::error::DNS A record for $DOMAIN is not publicly resolvable."
            exit 1
          }
          test "$RESOLVED_IP" = "$SERVER_HOST" || {
            echo "::error::$DOMAIN resolves to $RESOLVED_IP instead of $SERVER_HOST."
            exit 1
          }

          curl --fail --silent --show-error --head \
            --retry 10 --retry-delay 10 --retry-all-errors \
            --connect-timeout 10 --max-time 30 \
            "https://${DOMAIN}/"

      - name: Run Plan browser regression
        shell: bash
        env:
          PLAN_BASE_URL: https://panel.kimiagarkhoone.com
          PLAN_USERNAME: ${{ secrets.DJANGO_ADMIN_USERNAME }}
          PLAN_PASSWORD: ${{ secrets.DJANGO_ADMIN_PASSWORD }}
          PLAN_STUDENT_LABEL: نمونه تجربی دوازدهم
          PLAN_TEST_WEEK: 1499-01-01
        run: |
          set -euo pipefail
          export PLAN_USERNAME="${PLAN_USERNAME:-admin}"
          python3 -m venv .plan-browser-venv
          .plan-browser-venv/bin/pip install -q --upgrade pip
          .plan-browser-venv/bin/pip install -q playwright
          .plan-browser-venv/bin/python -m playwright install --with-deps chromium
          .plan-browser-venv/bin/python deploy/plan_e2e.py
